<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Detect AI - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body class="font-display bg-slate-50 min-h-screen">
    
    <div class="max-w-4xl mx-auto py-12 px-4">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Profile Settings</h1>
            <p class="text-slate-500">Manage your account preferences</p>
        </div>
        
        <!-- Profile Card -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <!-- Cover Image -->
            <div class="h-32 gradient-bg relative">
                <button class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-sm text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-white/30 transition-all">
                    <span class="material-symbols-outlined text-sm">photo_camera</span>
                    Change Cover
                </button>
            </div>
            
            <!-- Profile Info -->
            <div class="px-8 pb-8">
                <div class="flex flex-col md:flex-row md:items-end -mt-12 mb-8">
                    <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center text-white text-3xl font-bold shadow-xl mb-4 md:mb-0 md:mr-6">
                        AM
                    </div>
                    <div class="flex-1">
                        <h2 class="text-2xl font-bold">Alex Morgan</h2>
                        <p class="text-slate-500">Safety Manager · Last active 2 mins ago</p>
                    </div>
                    <button class="mt-4 md:mt-0 px-6 py-3 bg-primary text-white rounded-xl font-bold hover:bg-primary/90 transition-all">
                        Save Changes
                    </button>
                </div>
                
                <!-- Form Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                        <input type="text" value="Alex Morgan" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <input type="email" value="alex.morgan@ppedetect.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Role</label>
                        <select class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
                            <option>Safety Manager</option>
                            <option>Site Supervisor</option>
                            <option>Administrator</option>
                            <option>Viewer</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Department</label>
                        <input type="text" value="Safety Operations" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
                
                <!-- Notification Preferences -->
                <div class="mt-8 pt-6 border-t border-slate-200">
                    <h3 class="font-bold text-lg mb-4">Notification Preferences</h3>
                    <div class="space-y-3">
                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                            <div>
                                <p class="font-bold">Email Alerts</p>
                                <p class="text-xs text-slate-500">Receive violation alerts via email</p>
                            </div>
                            <input type="checkbox" class="w-5 h-5 rounded text-primary focus:ring-primary" checked>
                        </label>
                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                            <div>
                                <p class="font-bold">Push Notifications</p>
                                <p class="text-xs text-slate-500">Real-time alerts in browser</p>
                            </div>
                            <input type="checkbox" class="w-5 h-5 rounded text-primary focus:ring-primary" checked>
                        </label>
                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                            <div>
                                <p class="font-bold">Weekly Reports</p>
                                <p class="text-xs text-slate-500">Get compliance summary every Monday</p>
                            </div>
                            <input type="checkbox" class="w-5 h-5 rounded text-primary focus:ring-primary">
                        </label>
                    </div>
                </div>
                
                <!-- Security Section -->
                <div class="mt-8 pt-6 border-t border-slate-200">
                    <h3 class="font-bold text-lg mb-4">Security</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Current Password</label>
                            <input type="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="********">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">New Password</label>
                            <input type="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="Enter new password">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Confirm Password</label>
                            <input type="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="Confirm new password">
                        </div>
                    </div>
                </div>
                
                <!-- Two Factor Auth -->
                <div class="mt-8 pt-6 border-t border-slate-200">
                    <div class="flex items-center justify-between p-4 bg-primary/5 rounded-xl">
                        <div>
                            <p class="font-bold">Two-Factor Authentication</p>
                            <p class="text-xs text-slate-500">Add an extra layer of security</p>
                        </div>
                        <button class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-bold hover:bg-primary/90 transition-all">
                            Enable
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        .gradient-bg {
            background: linear-gradient(90deg, #ec5b13, #f97316, #fb923c);
            background-size: 200% 200%;
        }
    </style>
</body>
</html>
