<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPE Detector - Web UI</title>
      <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
  <body>
    <h1>PPE Detector</h1>
    <form id="upload-form">
      <input type="file" id="image-input" name="image" accept="image/*" />
      <button type="submit">Upload & Detect</button>
    </form>

    <div id="result">
      <h3>Result</h3>
      <img id="result-img" alt="detection result" style="max-width:90%;height:auto;" />
    </div>

    <script>
      const form = document.getElementById('upload-form');
      const input = document.getElementById('image-input');
      const resultImg = document.getElementById('result-img');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!input.files || input.files.length === 0) return alert('Select an image');
        const fd = new FormData();
        fd.append('image', input.files[0]);

        const res = await fetch('/detect', { method: 'POST', body: fd });
        if (!res.ok) {
          const j = await res.json().catch(()=>null);
          alert('Error: ' + (j && j.error ? j.error : res.statusText));
          return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        resultImg.src = url;
      });
    </script>
  </body>
</html>
